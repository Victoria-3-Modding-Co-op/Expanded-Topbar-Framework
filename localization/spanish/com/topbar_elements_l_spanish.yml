 com_topbar_element_army_size_tooltip: "#header [Concept('concept_battalion', 'Batallones')] [GetPlayer.GetAltAdjective('PM')]#!\nActuales: [GetPlayer.GetBattalions|v] @battalions! ([GetPlayer.GetBattalionsRanking])\n$TOOLTIP_DELIMITER$\nEn estos momentos, [GetPlayer.GetName] cuenta con [GetPlayer.GetBattalions|v] @battalions! ([GetPlayer.GetBattalionsRanking])\nEl número total de [Concept('concept_battalion', 'batallones')] [GetPlayer.GetAltAdjective('PM')] y su sofisticación tecnológica supone una [concept_power_projection|l] del ejército de tierra de #tooltippable #tooltip:[GetPlayer.GetTooltipTag],PANEL_MILITARY_ARMY_POWER_PROJECTION_TOOLTIP [GetPlayer.GetArmyPowerProjection|Dv0]#!#!\n\n[Concept('concept_army','$concept_armies$')]:\n[SelectLocalization(IsDataModelEmpty(AccessPlayer.GetMilitaryFormationsArmy), 'com_topbar_element_army_size_tooltip_no_army', 'com_topbar_element_army_size_tooltip_armies')]"
 com_topbar_element_army_size_tooltip_armies: "[AccessPlayer.GetArmiesBreakdown]"
 com_topbar_element_army_size_tooltip_no_army: "No hay [Concept('concept_army','ejércitos')] en [GetPlayer.GetName]"
 com_topbar_element_army_size_source: "$com_topbar_base_game_source$"
 com_topbar_element_army_size_source_tooltip: "$com_topbar_base_game_source_tooltip$"
 com_topbar_element_army_size_map_mode: "mm_military_formation"
 com_topbar_element_army_size_window: "com_topbar_army"

