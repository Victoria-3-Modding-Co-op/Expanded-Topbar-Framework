 com_topbar_element_bloc_size_tooltip: "#header [GetPlayer.GetPowerBloc.GetNumMembers] [Concept('concept_country','$concept_countries$')|l] en [GetPlayer.GetPowerBloc.GetName]#!\n$TOOLTIP_DELIMITER$\n[GetPlayer.GetPowerBloc.GetMembersBreakdown]"
 com_topbar_element_bloc_size_source: "$com_topbar_base_game_source$"
