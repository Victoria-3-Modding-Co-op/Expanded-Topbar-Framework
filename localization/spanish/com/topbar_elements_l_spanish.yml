 com_topbar_element_legitimacy_tooltip: "#header [GetPlayer.GetGovernmentLegitimacyLevel.GetNameNoFormatting]#! $LEGITIMACY_LEVEL_ACTIVE$\nSe aplica con una [concept_legitimacy|l] entre [GetPlayer.GetGovernmentLegitimacyLevel.GetLowerBound|v] y [GetPlayer.GetGovernmentLegitimacyLevel.GetUpperBound|v]\n$LEGITIMACY_LEVEL_CURRENT_LEGITIMACY_DESC$\n$TOOLTIP_DELIMITER$\n#title Efectos:#!#indent_newline:2 \n[GetPlayer.GetGovernmentLegitimacyLevel.GetEffectsWithLoyaltiesGain(GetPlayer.Self)]#!\n\n#title Esto se debe a:#!#indent_newline:2 \n[GetPlayer.GetGovernmentLegitimacyDesc]#!"
 com_topbar_element_legitimacy_source: "$com_topbar_base_game_source$"
