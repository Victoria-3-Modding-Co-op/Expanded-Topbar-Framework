 com_topbar_element_bloc_prestige_value: "[GetPlayer.GetPowerBloc.GetTotalPrestige|v]"
 com_topbar_element_bloc_prestige_tooltip: "#header [concept_prestige] de [GetPlayer.GetPowerBloc.GetName]#!\nTotal: [GetPlayer.GetPowerBloc.GetTotalPrestige|v] @prestige!\n$TOOLTIP_DELIMITER$\n[AccessPlayer.AccessPowerBloc.GetPrestigeDesc]"
 com_topbar_element_bloc_prestige_source: "$com_topbar_base_game_source$"
