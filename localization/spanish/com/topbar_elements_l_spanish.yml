 com_topbar_element_legitimacy_map_mode: "mm_political"
 com_topbar_element_legitimacy_window: "com_topbar_politics"

 # Country Innovation
 com_topbar_element_innovation: "com_topbar_element_innovation"
 com_topbar_element_innovation_icon: "@innovation!"
 com_topbar_element_innovation_value: "[GetPlayer.GetWeeklyInnovation|0v]"
 com_topbar_element_innovation_tooltip: "#header [concept_innovation]#!\n[GetPlayer.GetName] está generando #v [GetPlayer.GetWeeklyInnovation|+2]#! de [concept_innovation|l] @innovation! a la semana:\n[GetPlayer.GetWeeklyInnovationDesc]\n\nSe puede invertir un máximo de [GetPlayer.GetWeeklyMaxInnovation|v2] de [concept_innovation|l] @innovation! en investigaciones activas a la semana:\n[GetPlayer.GetWeeklyMaxInnovationDesc]\n\nLa [concept_innovation|l] que no se gaste debido a límites de inversión o a la falta de investigaciones activas aumentará la tasa de [concept_technology_spread|l] de nuestro país"
 com_topbar_element_innovation_source: "$com_topbar_base_game_source$"
 com_topbar_element_innovation_source_tooltip: "$com_topbar_base_game_source_tooltip$"
 com_topbar_element_innovation_map_mode: "mm_literacy"
 com_topbar_element_innovation_window: "com_topbar_innovation"

